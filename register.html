<!DOCTYPE html>
<html>
<head>
<title>Register - Admission Planet</title>
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</head>
<body>

<nav>
<div class="logo">Admission Planet</div>
</nav>

<section style="padding:50px 8%">
<h2>Student Registration</h2>

<form id="regForm">
<input type="text" name="name" placeholder="Full Name" required><br><br>
<input type="email" name="email" placeholder="Email" required><br><br>
<input type="text" name="phone" placeholder="Phone" required><br><br>
<input type="text" name="course" placeholder="Course Interested" required><br><br>
<button class="btn">Submit</button>
</form>

<p id="msg"></p>
</section>

<script>
(function(){
emailjs.init("YOUR_PUBLIC_KEY");
})();

document.getElementById("regForm").addEventListener("submit", function(e){
e.preventDefault();

emailjs.sendForm("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",this)
.then(function(){
document.getElementById("msg").innerText="Form Submitted Successfully!";
});
});
</script>

</body>
</html>
